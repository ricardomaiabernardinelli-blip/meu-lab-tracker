<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabTracker — Gestão de Exames Laboratoriais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ESTILOS ORIGINAIS RESTAURADOS */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2330; --border: #30363d;
    --text: #e6edf3; --text-muted: #7d8590; --accent: #2f81f7; --red: #f85149;
    --green: #3fb950; --yellow: #d29922; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  #root { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border-light); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 15px; margin: 4px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13.5px; color: var(--text-muted); transition: 0.2s; }
  .nav-item:hover { background: #21262d; color: var(--text); }
  .nav-item.active { background: #1f6feb22; color: var(--accent); font-weight: 500; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 14px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .content { flex: 1; overflow-y: auto; padding: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; }
  .card-body { padding: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 18px 20px; border-radius: var(--radius-lg); position: relative; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .badge-cat { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #1f6feb22; color: var(--accent); border: 1px solid #2f81f733; }
  .patient-chip { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); margin: 10px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid #21262d; }
  .edit-result-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid #21262d; }
  .form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// --- CONFIGURAÇÃO CLÍNICA ORIGINAL ---
const CATEGORIES = {
  hepatic: { label: 'Função Hepática', icon: '🫀' },
  renal: { label: 'Função Renal', icon: '🫘' },
  hemogram: { label: 'Hemograma', icon: '🩸' },
  lipid: { label: 'Perfil Lipídico', icon: '💧' },
  glycemic: { label: 'Glicêmico', icon: '🍬' },
  other: { label: 'Outros', icon: '🔬' }
};

const EXAM_CATALOG = {
  'AST': { aliases: ['TGO'], category: 'hepatic', unit: 'U/L', refMin: 10, refMax: 40 },
  'ALT': { aliases: ['TGP'], category: 'hepatic', unit: 'U/L', refMin: 7, refMax: 56 },
  'CREATININA': { aliases: ['CREAT'], category: 'renal', unit: 'mg/dL', refMin: 0.6, refMax: 1.2 },
  'GLICOSE': { aliases: ['GLICEMIA'], category: 'glycemic', unit: 'mg/dL', refMin: 70, refMax: 99 },
  'COLESTEROL TOTAL': { aliases: ['CT'], category: 'lipid', unit: 'mg/dL', refMin: 0, refMax: 200 }
};

function normalizeName(n) {
  const u = n.toUpperCase();
  for (const [k, v] of Object.entries(EXAM_CATALOG)) {
    if (u === k || v.aliases.some(a => u.includes(a))) return k;
  }
  return n;
}

// --- FUNÇÃO DE IMPORTAÇÃO CSV (NOVA) ---
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  return lines.slice(1).map((line, i) => {
    const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
    const name = normalizeName(cols[1] || "");
    const info = EXAM_CATALOG[name] || {};
    return {
      _id: Date.now() + i,
      examName: name,
      value: parseFloat(cols[2]) || 0,
      unit: cols[3] || info.unit || "",
      date: cols[4] || new Date().toISOString().split('T')[0],
      refMin: cols[5] ? parseFloat(cols[5]) : info.refMin,
      refMax: cols[6] ? parseFloat(cols[6]) : info.refMax,
      keep: true
    };
  });
}

// --- COMPONENTES ---

function Dashboard({ db, patientId }) {
  const results = useMemo(() => db.results.filter(r => r.patientId === patientId), [db, patientId]);
  return (
    <div className="grid-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px' }}>
      <div className="stat-card">
        <div className="stat-value">{results.length}</div>
        <div className="stat-label">Total de Exames</div>
      </div>
      <div className="card" style={{ gridColumn: 'span 3', marginTop: '20px' }}>
        <div className="card-header"><span className="card-title">Histórico Recente</span></div>
        <div className="card-body">
          <table>
            <thead><tr><th>Exame</th><th>Valor</th><th>Data</th><th>Status</th></tr></thead>
            <tbody>
              {results.slice(-10).reverse().map(r => (
                <tr key={r.id}>
                  <td>{r.examName}</td>
                  <td style={{fontFamily: 'var(--mono)'}}>{r.value} {r.unit}</td>
                  <td>{new Date(r.date + 'T12:00:00').toLocaleDateString()}</td>
                  <td><span className="badge-cat">{r.value > r.refMax ? 'Alto' : 'Normal'}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ImportView({ onImport }) {
  const [step, setStep] = useState('upload');
  const [extracted, setExtracted] = useState([]);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setExtracted(parseCSV(ev.target.result));
      setStep('review');
    };
    reader.readAsText(file);
  };

  if (step === 'review') {
    return (
      <div className="card">
        <div className="card-header"><span className="card-title">Revisar Dados do CSV</span></div>
        <div className="card-body">
          {extracted.map((r, i) => (
            <div key={r._id} className="edit-result-row">
              <input className="form-input" value={r.examName} onChange={e => {
                const n = [...extracted]; n[i].examName = e.target.value; setExtracted(n);
              }} />
              <input className="form-input" type="number" value={r.value} onChange={e => {
                const n = [...extracted]; n[i].value = parseFloat(e.target.value); setExtracted(n);
              }} />
              <input className="form-input" value={r.unit} onChange={e => {
                const n = [...extracted]; n[i].unit = e.target.value; setExtracted(n);
              }} />
              <input className="form-input" type="date" value={r.date} onChange={e => {
                const n = [...extracted]; n[i].date = e.target.value; setExtracted(n);
              }} />
            </div>
          ))}
          <button className="nav-item active" style={{border:'none', marginTop:'20px', width:'100%'}} 
            onClick={() => onImport(extracted.filter(x => x.keep))}>Confirmar Importação</button>
        </div>
      </div>
    );
  }

  return (
    <div className="card" style={{textAlign: 'center', padding: '40px'}}>
      <div style={{fontSize: '40px', marginBottom: '20px'}}>📊</div>
      <h3>Importar via CSV</h3>
      <p style={{color: 'var(--text-muted)', marginBottom: '20px'}}>Selecione um arquivo .csv (Paciente, Exame, Valor, Unidade, Data, Mín, Máx)</p>
      <input type="file" accept=".csv" onChange={handleFile} />
    </div>
  );
}

// --- APP ---

function App() {
  const [db, setDB] = useState(() => {
    const s = localStorage.getItem('labtracker_db');
    return s ? JSON.parse(s) : { patients: [{id: 1, name: 'Ricardo Maia'}], results: [], nextId: 1 };
  });
  const [view, setView] = useState('dashboard');
  const [patientId, setPatientId] = useState(1);

  useEffect(() => { localStorage.setItem('labtracker_db', JSON.stringify(db)); }, [db]);

  const handleImport = (data) => {
    setDB(prev => {
      let nid = prev.nextId;
      const formatted = data.map(d => ({ ...d, id: nid++, patientId: patientId }));
      return { ...prev, results: [...prev.results, ...formatted], nextId: nid };
    });
    setView('dashboard');
  };

  return (
    <div id="root" style={{display: 'flex', width: '100%'}}>
      <aside className="sidebar">
        <div className="sidebar-logo"><div style={{fontWeight:600}}>🧪 LabTracker</div></div>
        <div className={`nav-item ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}>Dashboard</div>
        <div className={`nav-item ${view === 'import' ? 'active' : ''}`} onClick={() => setView('import')}>Importar CSV</div>
        <div style={{marginTop:'auto'}}>
          <div className="patient-chip">👤 {db.patients.find(p => p.id === patientId)?.name}</div>
        </div>
      </aside>
      <main className="main">
        <div className="topbar"><h3>{view === 'dashboard' ? 'Painel Clínico' : 'Importação de Dados'}</h3></div>
        <div className="content">
          {view === 'dashboard' && <Dashboard db={db} patientId={patientId} />}
          {view === 'import' && <ImportView onImport={handleImport} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
