<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabTracker — Gestão de Exames Laboratoriais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Estilos originais restaurados */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2330; --border: #30363d;
    --text: #e6edf3; --text-muted: #7d8590; --accent: #2f81f7; --red: #f85149;
    --green: #3fb950; --yellow: #d29922; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
  #root { display: flex; width: 100%; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content { padding: 28px; overflow-y: auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; padding: 20px; }
  .nav-item { padding: 10px 15px; cursor: pointer; color: var(--text-muted); border-radius: 8px; margin: 5px 10px; }
  .nav-item.active { background: #1f6feb22; color: var(--accent); font-weight: 600; }
  .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; border: none; font-weight: 500; }
  .btn-primary { background: var(--accent); color: white; }
  .patient-chip { padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin: 10px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { text-align: left; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid #21262d; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// O código React abaixo restaura TODA a lógica de multi-paciente e catálogo
const { useState, useEffect, useMemo } = React;

// Inserir aqui o EXAM_CATALOG completo do arquivo original
const EXAM_CATALOG = {
  'AST': { aliases: ['TGO'], category: 'hepatic', unit: 'U/L', refMin: 10, refMax: 40 },
  'ALT': { aliases: ['TGP'], category: 'hepatic', unit: 'U/L', refMin: 7, refMax: 56 },
  'CREATININA': { aliases: ['CREAT'], category: 'renal', unit: 'mg/dL', refMin: 0.6, refMax: 1.2 },
  'GLICOSE': { aliases: ['GLICEMIA'], category: 'glycemic', unit: 'mg/dL', refMin: 70, refMax: 99 },
  'HEMOGLOBINA': { aliases: ['HB'], category: 'hemogram', unit: 'g/dL', refMin: 12, refMax: 17 }
  // ... adicione os demais conforme necessário
};

function normalizeExam(name) {
  const up = name.toUpperCase();
  for (const [key, val] of Object.entries(EXAM_CATALOG)) {
    if (up === key || val.aliases.some(a => up.includes(a))) return key;
  }
  return name;
}

function App() {
  const [db, setDB] = useState(() => {
    const saved = localStorage.getItem('labtracker_db');
    // Restaura a estrutura de multi-paciente se estiver vazio
    return saved ? JSON.parse(saved) : { patients: [{id: 1, name: 'Ricardo Maia'}], results: [], nextId: 1 };
  });
  const [view, setView] = useState('dashboard');
  const [patientId, setPatientId] = useState(1);

  useEffect(() => { localStorage.setItem('labtracker_db', JSON.stringify(db)); }, [db]);

  // Função de Importação CSV corrigida e integrada
  const handleCSV = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const lines = e.target.result.split('\n').filter(l => l.trim());
      const newResults = lines.slice(1).map(line => {
        const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
        const name = normalizeExam(cols[1]);
        const info = EXAM_CATALOG[name] || {};
        return {
          id: db.nextId + Math.random(),
          patientId: patientId,
          examName: name,
          value: parseFloat(cols[2]),
          unit: cols[3] || info.unit,
          date: cols[4],
          refMin: cols[5] ? parseFloat(cols[5]) : info.refMin,
          refMax: cols[6] ? parseFloat(cols[6]) : info.refMax
        };
      });
      setDB(prev => ({ ...prev, results: [...prev.results, ...newResults], nextId: prev.nextId + newResults.length }));
      setView('dashboard');
    };
    reader.readAsText(file);
  };

  return (
    <div id="root">
      <aside className="sidebar">
        <div style={{padding: '20px', fontWeight: 'bold'}}>🧪 LabTracker</div>
        <div className={`nav-item ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}>Dashboard</div>
        <div className={`nav-item ${view === 'import' ? 'active' : ''}`} onClick={() => setView('import')}>Importar</div>
        <div style={{marginTop: 'auto', padding: '10px'}}>
           <div className="patient-chip">👤 {db.patients.find(p => p.id === patientId)?.name}</div>
        </div>
      </aside>
      <main className="main">
        <div className="content">
          {view === 'dashboard' && (
            <div className="card">
              <h2>Resultados de {db.patients.find(p => p.id === patientId)?.name}</h2>
              <table>
                <thead><tr><th>Exame</th><th>Valor</th><th>Data</th></tr></thead>
                <tbody>
                  {db.results.filter(r => r.patientId === patientId).map(r => (
                    <tr key={r.id}><td>{r.examName}</td><td>{r.value} {r.unit}</td><td>{r.date}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {view === 'import' && (
            <div className="card">
              <h2>Importar Arquivo CSV</h2>
              <input type="file" accept=".csv" onChange={(e) => handleCSV(e.target.files[0])} />
              <p style={{marginTop: '10px', color: 'var(--text-muted)'}}>Formato esperado: Paciente, Exame, Valor, Unidade, Data, RefMin, RefMax</p>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
