<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabTracker — Gestão de Exames Laboratoriais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --border-light: #21262d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --accent: #2f81f7;
    --accent-soft: #1f6feb22;
    --green: #3fb950;
    --green-soft: #238636;
    --red: #f85149;
    --red-soft: #da363122;
    --yellow: #d29922;
    --yellow-soft: #9e6a0322;
    --purple: #a371f7;
    --orange: #f0883e;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  html { font-size: 15px; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  #root { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border-light); }
  .logo-mark { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 15px; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; margin: 4px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13.5px; color: var(--text-muted); transition: 0.2s; }
  .nav-item:hover { background: var(--border-light); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 14px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .content { flex: 1; overflow-y: auto; padding: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-body { padding: 20px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: var(--font); transition: 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .form-input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); outline: none; }
  .form-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius-lg); border-top: 3px solid var(--accent); }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .alert { padding: 14px; border-radius: var(--radius); border-left: 4px solid var(--red); background: var(--red-soft); color: var(--text); margin-bottom: 10px; }
  .badge-cat { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--accent-soft); color: var(--accent); border: 1px solid #2f81f733; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 12px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border-light); }
  .edit-result-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// --- Configurações Clínicas ---
const CATEGORIES = {
  hepatic: { label: 'Hepática', color: '#f0883e' },
  renal: { label: 'Renal', color: '#a371f7' },
  hemogram: { label: 'Hemograma', color: '#f85149' },
  lipid: { label: 'Lipídico', color: '#2f81f7' },
  glycemic: { label: 'Glicêmico', color: '#d29922' },
  other: { label: 'Outros', color: '#7d8590' }
};

const EXAM_CATALOG = {
  'AST': { aliases: ['TGO'], category: 'hepatic', unit: 'U/L', refMin: 10, refMax: 40 },
  'ALT': { aliases: ['TGP'], category: 'hepatic', unit: 'U/L', refMin: 7, refMax: 56 },
  'CREATININA': { aliases: ['CREAT'], category: 'renal', unit: 'mg/dL', refMin: 0.6, refMax: 1.2 },
  'GLICOSE': { aliases: ['GLICEMIA'], category: 'glycemic', unit: 'mg/dL', refMin: 70, refMax: 99 },
  'COLESTEROL TOTAL': { aliases: ['CT'], category: 'lipid', unit: 'mg/dL', refMin: 0, refMax: 200 }
};

// --- Funções Auxiliares ---
function normalizeExamName(raw) {
  const upper = raw.toUpperCase().trim();
  for (const [canonical, info] of Object.entries(EXAM_CATALOG)) {
    if (upper === canonical || info.aliases.some(a => upper.includes(a))) return canonical;
  }
  return raw;
}

function classifyValue(val, min, max) {
  if (max && val > max) return 'high';
  if (min && val < min) return 'low';
  return 'normal';
}

// --- Componentes ---

function Dashboard({ db, patientId }) {
  const results = db.results.filter(r => r.patientId === patientId);
  const stats = useMemo(() => ({
    total: results.length,
    altered: results.filter(r => classifyValue(r.value, r.refMin, r.refMax) !== 'normal').length
  }), [results]);

  return (
    <div>
      <div className="grid-3" style={{ marginBottom: 24 }}>
        <div className="stat-card">
          <div className="stat-value">{stats.total}</div>
          <div className="stat-label">Resultados Totais</div>
        </div>
        <div className="stat-card" style={{ borderColor: 'var(--red)' }}>
          <div className="stat-value">{stats.altered}</div>
          <div className="stat-label">Valores Alterados</div>
        </div>
      </div>
      <div className="section-title" style={{ color: 'var(--text-muted)', marginBottom: 12 }}>Últimos Resultados</div>
      <div className="card">
        <div className="card-body">
          <table>
            <thead><tr><th>Exame</th><th>Valor</th><th>Data</th><th>Status</th></tr></thead>
            <tbody>
              {results.slice(-10).reverse().map(r => (
                <tr key={r.id}>
                  <td>{r.examName}</td>
                  <td>{r.value} {r.unit}</td>
                  <td>{new Date(r.date + 'T12:00:00').toLocaleDateString()}</td>
                  <td>{classifyValue(r.value, r.refMin, r.refMax)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ImportView({ onImport }) {
  const [step, setStep] = useState('upload');
  const [extracted, setExtracted] = useState([]);

  // Nova Rotina de Importação CSV
  const handleCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split('\n').filter(l => l.trim());
      const data = lines.slice(1).map((line, i) => {
        const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
        return {
          id: i,
          examName: normalizeExamName(cols[1] || ""),
          value: parseFloat(cols[2]) || 0,
          unit: cols[3] || "",
          date: cols[4] || new Date().toISOString().split('T')[0],
          refMin: parseFloat(cols[5]) || null,
          refMax: parseFloat(cols[6]) || null,
          keep: true
        };
      });
      setExtracted(data);
      setStep('review');
    };
    reader.readAsText(file);
  };

  if (step === 'review') {
    return (
      <div className="card">
        <div className="card-header"><span className="card-title">Revisar Importação</span></div>
        <div className="card-body">
          {extracted.map((r, i) => (
            <div key={i} className="edit-result-row">
              <input className="form-input" value={r.examName} onChange={e => {
                const newD = [...extracted]; newD[i].examName = e.target.value; setExtracted(newD);
              }} />
              <input className="form-input" type="number" value={r.value} onChange={e => {
                const newD = [...extracted]; newD[i].value = parseFloat(e.target.value); setExtracted(newD);
              }} />
              <input className="form-input" value={r.unit} onChange={e => {
                const newD = [...extracted]; newD[i].unit = e.target.value; setExtracted(newD);
              }} />
              <input className="form-input" type="date" value={r.date} onChange={e => {
                const newD = [...extracted]; newD[i].date = e.target.value; setExtracted(newD);
              }} />
              <button className="btn btn-primary" onClick={() => {
                onImport(extracted.filter(x => x.keep));
              }}>Confirmar</button>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="grid-3">
      <div className="card">
        <div className="card-header"><span className="card-title">📁 Importar CSV</span></div>
        <div className="card-body">
          <input type="file" accept=".csv" onChange={handleCSV} />
          <p style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 10 }}>Padrão: Paciente, Exame, Valor, Unidade, Data, RefMin, RefMax</p>
        </div>
      </div>
    </div>
  );
}

// --- App Principal ---

function App() {
  const [db, setDB] = useState(() => {
    const saved = localStorage.getItem('labtracker_db');
    return saved ? JSON.parse(saved) : { patients: [{ id: 1, name: 'Paciente Um' }], results: [], nextResultId: 1 };
  });
  const [view, setView] = useState('dashboard');

  useEffect(() => { localStorage.setItem('labtracker_db', JSON.stringify(db)); }, [db]);

  const handleImport = (newData) => {
    setDB(prev => {
      let nid = prev.nextResultId;
      const formatted = newData.map(d => ({ ...d, id: nid++, patientId: 1 }));
      return { ...prev, results: [...prev.results, ...formatted], nextResultId: nid };
    });
    setView('dashboard');
  };

  return (
    <div id="root" style={{ width: '100%' }}>
      <aside className="sidebar">
        <div className="sidebar-logo"><div className="logo-mark"><div className="logo-icon">🧪</div><span className="logo-text">LabTracker</span></div></div>
        <div className="nav-item" onClick={() => setView('dashboard')}>Dashboard</div>
        <div className="nav-item" onClick={() => setView('import')}>Importar</div>
      </aside>
      <div className="main">
        <div className="topbar"><div className="logo-text">{view === 'dashboard' ? 'Painel Geral' : 'Importar Dados'}</div></div>
        <div className="content">
          {view === 'dashboard' && <Dashboard db={db} patientId={1} />}
          {view === 'import' && <ImportView onImport={handleImport} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
